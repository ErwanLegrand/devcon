version: "3.8"

services:
  {service}:
    environment:
    {{ for env in envs }}
      - {env.source}={env.dest}
    {{ endfor}}

    volumes:
    {{ for volume in volumes }}
      - {volume.source}:{volume.dest}{volume.suffix}
    {{ endfor}}
{{ if build_args }}
    build:
      args:
      {{ for arg in build_args }}
        {arg.source}: "{arg.dest}"
      {{ endfor}}
{{ endif }}
