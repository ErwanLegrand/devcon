name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: '1.85'
        components: llvm-tools-preview
    - name: Run tests
      run: cargo test --verbose
    - name: Run integration tests
      run: cargo test --test integration --verbose
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov
    - name: Run tests with coverage (enforce ≥80% threshold)
      # continue-on-error until the testing/fuzzing track brings coverage to ≥80%
      continue-on-error: true
      run: cargo llvm-cov --all-features --workspace --fail-under-lines 80
    - name: Run tests with coverage (generate lcov report)
      run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: lcov.info
        fail_ci_if_error: false
