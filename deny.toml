[graph]
# Target x86_64 Linux as the primary platform
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[licenses]
# Only allow OSI-approved permissive licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",  # colored, option-ext (transitive via dirs/shellexpand)
    "AGPL-3.0",  # devcont itself (AGPL-3.0-or-later)
]
# Confidence threshold for license detection
confidence-threshold = 0.8

[bans]
# Deny duplicate versions of the same crate (with exceptions for known-safe pairs)
multiple-versions = "warn"
# Deny crates we explicitly don't want
deny = []

[advisories]
# Check for security vulnerabilities
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Advisory IDs to ignore (add entries here when needed)
ignore = [
    # RUSTSEC-2026-0025: libcrux-psq advisory uses CVSS 4.0 which cargo-deny
    # 0.18.x does not yet parse; ignored until cargo-deny is updated
    { id = "RUSTSEC-2026-0025", reason = "CVSS 4.0 format not yet supported by cargo-deny 0.18.x; not a direct or transitive dependency" },
]
